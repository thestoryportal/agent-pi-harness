# ──────────────────────────────────────────────────────────────────
# READ-ONLY PATHS
# Edit and Write tools are blocked. Bash read operations (cat, grep,
# head, tail) are allowed. These files define project structure and
# must not be modified by Claude Code during normal sessions.
# Supports glob patterns: *.lock, *.min.js
# ──────────────────────────────────────────────────────────────────

readOnlyPaths:
  # ---------------------------------------------------------------------------
  # SYSTEM DIRECTORIES
  # ---------------------------------------------------------------------------
  - /etc/
  - /usr/
  - /bin/
  - /sbin/
  - /boot/
  - /root/

  # ---------------------------------------------------------------------------
  # SHELL HISTORY FILES
  # ---------------------------------------------------------------------------
  - ~/.bash_history
  - ~/.zsh_history
  - ~/.node_repl_history

  # ---------------------------------------------------------------------------
  # SHELL CONFIG FILES
  # ---------------------------------------------------------------------------
  - ~/.bashrc
  - ~/.zshrc
  - ~/.profile
  - ~/.bash_profile

  # ---------------------------------------------------------------------------
  # HOOK AND SETTINGS FILES (ArhuGula-specific)
  # patterns.yaml is intentionally excluded — it is the user-configurable
  # security rule file that the damage-control skill edits directly.
  # ---------------------------------------------------------------------------
  # SP2 audit Phase H (2026-04-13): security boundary restored after the
  # decision gate resolution + SP1 resume-pass + Phase D-G work. The original
  # `.claude/hooks/*.py` glob is replaced by an explicit 7-file security-
  # critical list per D10=A. After Phase E, the bash/edit/write damage-
  # control hook files live under .claude/skills/damage-control/, so 3 of
  # the 7 entries point at skill paths instead of the old project paths.
  # The other 4 (session_start, permission_request, pre_tool_use, _base)
  # remain at the project location per SP1 D6 (catch-all + utility hooks).
  # .claude/settings.json restored as-is per D11=A.
  - ".claude/hooks/session_start.py"
  - ".claude/hooks/permission_request.py"
  - ".claude/hooks/pre_tool_use.py"
  - ".claude/hooks/_base.py"
  - ".claude/skills/damage-control/hooks/damage-control-python/bash_damage_control.py"
  - ".claude/skills/damage-control/hooks/damage-control-python/edit_damage_control.py"
  - ".claude/skills/damage-control/hooks/damage-control-python/write_damage_control.py"
  - ".claude/settings.json"

  # ---------------------------------------------------------------------------
  # LOCK FILES — Never manually edit, use package managers
  # ---------------------------------------------------------------------------
  - "package-lock.json"
  - "yarn.lock"
  - "pnpm-lock.yaml"
  - "Gemfile.lock"
  - "poetry.lock"
  - "Pipfile.lock"
  - "composer.lock"
  - "Cargo.lock"
  - "go.sum"
  - "flake.lock"
  - "bun.lockb"
  - "uv.lock"
  - "npm-shrinkwrap.json"
  - "*.lock"
  - "*.lockb"

  # ---------------------------------------------------------------------------
  # MINIFIED/COMPILED FILES — Generated, don't edit
  # ---------------------------------------------------------------------------
  - "*.min.js"
  - "*.min.css"
  - "*.bundle.js"
  - "*.chunk.js"

  # ---------------------------------------------------------------------------
  # BUILD ARTIFACTS — Generated directories, don't edit
  # ---------------------------------------------------------------------------
  - dist/
  - build/
  - out/
  - .next/
  - .nuxt/
  - .output/
  - node_modules/
  - __pycache__/
  - .venv/
  - venv/
  - target/

# ──────────────────────────────────────────────────────────────────
# NO-DELETE PATHS
# Files in these paths cannot be deleted. Write (overwrite) triggers
# an ask decision. Edit (modify) is allowed. These are accumulation-
# only directories where history matters.
# Supports glob patterns: *.md, LICENSE*
# ──────────────────────────────────────────────────────────────────

noDeletePaths:
  # ---------------------------------------------------------------------------
  # CLAUDE CODE CONFIGURATION
  # ---------------------------------------------------------------------------
  - ~/.claude/
  - CLAUDE.md

  # ---------------------------------------------------------------------------
  # DATABASE MIGRATIONS (ArhuGula-specific)
  # ---------------------------------------------------------------------------
  - "database/migrations/"
  - "prompts/"

  # ---------------------------------------------------------------------------
  # LICENSE AND LEGAL FILES
  # ---------------------------------------------------------------------------
  - "LICENSE"
  - "LICENSE.*"
  - "COPYING"
  - "COPYING.*"
  - "NOTICE"
  - "PATENTS"

  # ---------------------------------------------------------------------------
  # PROJECT DOCUMENTATION
  # ---------------------------------------------------------------------------
  - "README.md"
  - "README.*"
  - "CONTRIBUTING.md"
  - "CHANGELOG.md"
  - "CODE_OF_CONDUCT.md"
  - "SECURITY.md"

  # ---------------------------------------------------------------------------
  # GIT DIRECTORY
  # ---------------------------------------------------------------------------
  - .git/
  - .gitignore
  - .gitattributes
  - .gitmodules

  # ---------------------------------------------------------------------------
  # CI/CD CONFIGURATION
  # ---------------------------------------------------------------------------
  - .github/
  - .gitlab-ci.yml
  - .circleci/
  - Jenkinsfile
  - .travis.yml
  - azure-pipelines.yml

  # ---------------------------------------------------------------------------
  # DOCKER CONFIGURATION
  # ---------------------------------------------------------------------------
  - Dockerfile
  - "Dockerfile.*"
  - docker-compose.yml
  - "docker-compose.*.yml"
  - .dockerignore

# ──────────────────────────────────────────────────────────────────
# PATH EXCLUSIONS (SP2 E1, 2026-04-13)
# Files matching these glob patterns are NEVER blocked by zero-access
# or read-only rules, even if they would otherwise match. Used for
# safe template / example files that must be readable for new-project
# setup (e.g. .env.example).
#
# Checked BEFORE zeroAccessPaths/readOnlyPaths in all 4 hooks:
#   - bash_damage_control._check_single_command (token-level filter
#     applied to cmd_tokens before the zero-access loop)
#   - edit_damage_control.check_path (early-exit on file_path)
#   - write_damage_control.check_path (early-exit on file_path)
#   - pre_tool_use.check_read (early-exit on Read/Glob/Grep file_path)
#
# Token-level semantics (not command-level) for the bash hook ensures
# that `cat .env .env.example` still blocks on .env even though
# .env.example is excluded — the exclusion only filters the matching
# token, not the whole command.
# ──────────────────────────────────────────────────────────────────

pathExclusions:
  - ".env.example"
  - ".env*.example"
  - ".envrc.example"

# ──────────────────────────────────────────────────────────────────
# BASH TOOL EXCLUSIONS
# Allowlist for operations that would otherwise be caught by
# zeroAccessPaths or bash patterns. Checked BEFORE blocking rules.
# ──────────────────────────────────────────────────────────────────

bashToolExclusions:
  - pattern: '\bcat\s+\.env\.example'
    reason: "Reading .env.example is safe — no secrets"
  - pattern: '\bcat\s+\.envrc\.example'
    reason: "Reading .envrc.example is safe — no secrets"
  - pattern: '\bgrep\s+.*\.(envrc|env)\.'
    reason: "Grepping for .envrc/.env references in code is safe"
  - pattern: '\brm\s+.*\.pyc$'
    reason: "Removing .pyc files is safe"
  - pattern: '\brm\s+.*__pycache__'
    reason: "Removing pycache is safe"
  - pattern: '\brm\s+.*node_modules'
    reason: "Removing node_modules is safe"
  - pattern: '\bls\s+.*\.claude/hooks/'
    reason: "Listing hook files is safe"
  - pattern: '\bcat\s+.*\.claude/hooks/'
    reason: "Reading hook source code is safe for debugging"
  - pattern: '\bhead\s+.*\.claude/hooks/'
    reason: "Reading hook headers is safe"
  - pattern: '\bwc\s+.*\.claude/hooks/'
    reason: "Counting lines in hook files is safe"
