# ArhuGula Skill Catalog
# Cross-device distribution manifest following the-library pattern.
# Each entry maps to a backing .claude/commands/<name>.md file.

skills:
  prime:
    description: Load full project context for orientation
    command: prime.md
    layer: 1  # Skill

  scout:
    description: Read a spec, identify implementation units, produce structured task list
    command: scout.md
    layer: 1  # Skill

  build:
    description: Execute implementation task with validation hooks active via builder agent
    command: build.md
    layer: 2  # Subagent
    agent: builder

  harness-review:
    description: Multi-model consensus code review via validator and spec-checker agents
    command: harness-review.md
    layer: 2  # Subagent
    agents: [validator, spec-checker]

  migrate:
    description: Database and schema migration
    command: migrate.md
    layer: 1  # Skill
