<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArhuGula Observe</title>
<script src="/vue.global.prod.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'SF Mono', 'Menlo', 'Monaco', monospace; font-size: 13px; background: #1a1a2e; color: #e0e0e0; }
  .header { background: #16213e; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #0f3460; }
  .header h1 { font-size: 16px; color: #e94560; }
  .status { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot.connected { background: #4ecca3; }
  .dot.disconnected { background: #e94560; }
  .filters { padding: 10px 20px; background: #16213e; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; border-bottom: 1px solid #0f3460; }
  .filters label { font-size: 11px; color: #888; }
  .filters select, .filters input { background: #1a1a2e; border: 1px solid #0f3460; color: #e0e0e0; padding: 4px 8px; font-size: 12px; font-family: inherit; border-radius: 3px; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th { position: sticky; top: 0; background: #16213e; padding: 8px 12px; text-align: left; font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #0f3460; }
  td { padding: 6px 12px; border-bottom: 1px solid #0f3460; font-size: 12px; white-space: nowrap; }
  tr:nth-child(even) { background: #16213e; }
  tr:hover { background: #1a2744; }
  tr.clickable { cursor: pointer; }
  .exit-0 { color: #4ecca3; }
  .exit-1 { color: #f0c040; }
  .exit-2 { color: #e94560; }
  .payload-row td { padding: 8px 12px; background: #0d1117; white-space: pre-wrap; word-break: break-all; font-size: 11px; color: #8b949e; }
  .empty { text-align: center; padding: 40px; color: #555; }
  .count { font-size: 11px; color: #555; padding: 8px 20px; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>ArhuGula Observe</h1>
    <div class="status">
      <span class="dot" :class="wsConnected ? 'connected' : 'disconnected'"></span>
      <span>{{ wsConnected ? 'Live' : 'Disconnected' }}</span>
      <span style="color:#555">| {{ events.length }} events</span>
    </div>
  </div>

  <div class="filters">
    <div>
      <label>Type</label><br>
      <select v-model="filterType" @change="applyFilters">
        <option value="">All</option>
        <option v-for="t in eventTypes" :key="t" :value="t">{{ t }}</option>
      </select>
    </div>
    <div>
      <label>Session</label><br>
      <input v-model="filterSession" @input="applyFilters" placeholder="session_id...">
    </div>
  </div>

  <div class="table-wrap">
    <table v-if="filtered.length > 0">
      <thead>
        <tr>
          <th>Timestamp</th>
          <th>Type</th>
          <th>Hook</th>
          <th>Session</th>
          <th>Exit</th>
          <th>Duration</th>
        </tr>
      </thead>
      <tbody>
        <template v-for="e in filtered" :key="e.id">
          <tr class="clickable" @click="toggle(e.id)">
            <td>{{ formatTime(e.timestamp) }}</td>
            <td>{{ e.event_type }}</td>
            <td>{{ e.hook_name }}</td>
            <td>{{ truncate(e.session_id, 12) }}</td>
            <td :class="'exit-' + e.exit_code">{{ e.exit_code }} <span style="color:#555">{{ exitLabel(e.exit_code) }}</span></td>
            <td>{{ e.duration_ms != null ? e.duration_ms + 'ms' : '-' }}</td>
          </tr>
          <tr v-if="expanded === e.id" class="payload-row">
            <td colspan="6">{{ formatPayload(e.payload) }}</td>
          </tr>
        </template>
      </tbody>
    </table>
    <div v-else class="empty">No events yet. Hooks will emit events as you work.</div>
  </div>
  <div class="count" v-if="filtered.length > 0">
    Showing {{ filtered.length }} of {{ events.length }} events
  </div>
</div>

<script>
const { createApp, ref, computed, onMounted, onUnmounted } = Vue;

createApp({
  setup() {
    const events = ref([]);
    const expanded = ref(null);
    const wsConnected = ref(false);
    const filterType = ref('');
    const filterSession = ref('');
    let ws = null;
    let reconnectTimer = null;

    const eventTypes = computed(() => {
      const types = new Set(events.value.map(e => e.event_type));
      return [...types].sort();
    });

    const filtered = computed(() => {
      return events.value.filter(e => {
        if (filterType.value && e.event_type !== filterType.value) return false;
        if (filterSession.value && !e.session_id.includes(filterSession.value)) return false;
        return true;
      });
    });

    function formatTime(ts) {
      if (!ts) return '-';
      const d = new Date(ts);
      return d.toLocaleTimeString('en-US', { hour12: false }) + '.' + String(d.getMilliseconds()).padStart(3, '0');
    }

    function truncate(s, n) {
      if (!s) return '-';
      return s.length > n ? s.slice(0, n) + '...' : s;
    }

    function exitLabel(code) {
      if (code === 0) return 'allow';
      if (code === 1) return 'log';
      if (code === 2) return 'block';
      return '';
    }

    function formatPayload(p) {
      if (!p) return 'No payload';
      try { return JSON.stringify(JSON.parse(p), null, 2); }
      catch { return p; }
    }

    function toggle(id) {
      expanded.value = expanded.value === id ? null : id;
    }

    function applyFilters() { /* reactive via computed */ }

    function connectWS() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(proto + '//' + location.host + '/ws');
      ws.onopen = () => { wsConnected.value = true; };
      ws.onclose = () => {
        wsConnected.value = false;
        reconnectTimer = setTimeout(connectWS, 3000);
      };
      ws.onmessage = (msg) => {
        try {
          const event = JSON.parse(msg.data);
          events.value.unshift(event);
        } catch {}
      };
    }

    async function loadInitial() {
      try {
        const res = await fetch('/api/events?limit=200');
        events.value = await res.json();
      } catch {}
    }

    onMounted(() => {
      loadInitial();
      connectWS();
    });

    onUnmounted(() => {
      if (ws) ws.close();
      if (reconnectTimer) clearTimeout(reconnectTimer);
    });

    return { events, expanded, wsConnected, filterType, filterSession, eventTypes, filtered, formatTime, truncate, exitLabel, formatPayload, toggle, applyFilters };
  }
}).mount('#app');
</script>
</body>
</html>
